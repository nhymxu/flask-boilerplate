name: 'Dependency Review'
on:
  pull_request:
    branches-ignore:
      - 'dependabot/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
